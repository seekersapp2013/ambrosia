<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambrosia - Health Community</title>

    <!-- PWA: theme color for splash + address bar -->
    <meta name="theme-color" content="#10b981" />

    <!-- PWA: web app manifest -->
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ambrosia" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome + Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Custom styles -->
    <link href="/style1.css" rel="stylesheet">

    <style>
      #pwa-prompt { animation: slideUp .2s ease-out; }
      @keyframes slideUp { from { transform: translateY(8px); opacity: .6 } to { transform: translateY(0); opacity: 1 } }
    </style>
  </head>
  <body class="bg-ambrosia-100 text-gray-800 max-w-md mx-auto relative">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/pwa.js" defer></script>
  </body>
</html>
